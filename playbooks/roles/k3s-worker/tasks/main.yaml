- name: Read node token from control plane
  set_fact:
    k3s_token: "{{ lookup('file', '/tmp/k3s-token') }}"

- name: Install K3s agent
  shell: |
    curl -sfL https://get.k3s.io | K3S_URL=https://{{ master_ip }}:6443 K3S_TOKEN={{ k3s_token }} sh -
  args:
    creates: /usr/local/bin/k3s
  become: true

- name: Wait for K3s agent service to be active
  systemd:
    name: k3s-agent
    state: started
    enabled: true
  become: true

- name: Verify worker joined cluster
  shell: |
    kubectl get nodes {{ inventory_hostname }}
  register: node_status
  until: "'Ready' in node_status.stdout"
  retries: 15
  delay: 10
  become: true
  delegate_to: "{{ master_ip }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Label node as worker
  shell: |
    kubectl label node {{ inventory_hostname }} \
      node-role.kubernetes.io/worker=worker \
      --overwrite
  become: true
  delegate_to: "{{ master_ip }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
